<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema POS - Acceso Centralizado</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-content">
            <img src="beca.png" alt="Logo Control" class="welcome-logo">
            
            <div id="view-login" class="login-view view-active">
                <h2 style="margin-bottom: 10px; color: white;">Ingreso al Sistema</h2>
                <input type="text" id="login-user" placeholder="Nombre de usuario" required>
                <input type="password" id="login-pass" placeholder="Contraseña" required>
                <button class="btn-login" id="btn-login-action" onclick="processLoginRemote()">Ingresar</button>
            </div>

            <div id="view-menu" class="menu-view">
                <h2 id="menu-title" style="margin-bottom: 15px; color: white;">Panel de Operaciones</h2>
                <div class="welcome-options">
                    <button class="btn-welcome cobrar" id="opt-cobrar" onclick="showPOS()">
                        <span>🛒</span> IR A COBRAR
                    </button>
                    <button class="btn-welcome registrar" id="opt-registrar" onclick="openAdminModal('registrar')">
                        <span>➕</span> REGISTRAR NUEVO
                    </button>
                    <button class="btn-welcome modificar" id="opt-modificar" onclick="openAdminModal('modificar')">
                        <span>✏️</span> MODIFICAR PRODUCTO
                    </button>
                    <button class="btn-welcome crear-usuario" id="opt-usuarios" onclick="openAdminModal('usuario')">
                        <span>👤</span> CREAR USUARIO
                    </button>
                </div>
                <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <header>
        <div>
            <button class="btn-nav-back" onclick="backToMenu()">⬅ Menu Principal</button>
            <h1 style="display:inline-block; vertical-align:middle;">MiniMarket POS</h1>
            <span id="role-badge" class="badge-role">TRABAJADOR</span>
        </div>
    </header>

    <div class="main-layout">
        <div class="catalog-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar producto..." oninput="filterProducts()">
                <select id="category-filter" onchange="filterProducts()">
                    <option value="Todos">Todas las Categorías</option>
                    <option value="Licor">Licores</option>
                    <option value="Cerveza">Cervezas</option>
                    <option value="Vino">Vinos</option>
                    <option value="Gaseosas">Gaseosas / Aguas</option>
                    <option value="Snacks">Snacks</option>
                </select>
            </div>
            <div class="products-grid" id="products-grid"></div>
        </div>

        <div class="cart-container">
            <div class="cart-header">
                <span>Detalle de la Venta</span>
                <span id="cart-count">0 items</span>
            </div>
            <div class="cart-items" id="cart-items"></div>
            <div class="cart-footer">
                <div class="total-section">
                    <span>Total:</span>
                    <span id="cart-total">S/. 0.00</span>
                </div>
                <button class="btn-checkout" onclick="checkoutSale()">✔ Confirmar Venta (Salida)</button>
            </div>
        </div>
    </div>

    <div class="modal" id="admin-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title-text">Registrar Nuevo Producto</span>
                <button style="border:none; background:none; cursor:pointer; font-weight:bold; font-size: 16px;" onclick="closeModal()">X</button>
            </div>
            
            <div class="modal-body" id="body-producto">
                <div>
                    <label>Nombre del Producto</label>
                    <input type="text" id="prod-name" placeholder="Ej. Cristal 620ml">
                </div>
                <div>
                    <label>Categoría</label>
                    <select id="prod-category">
                        <option value="Licor">Licor / Destilado</option>
                        <option value="Cerveza">Cerveza</option>
                        <option value="Vino">Vino</option>
                        <option value="Gaseosas">Gaseosas / Aguas</option>
                        <option value="Snacks">Snacks</option>
                    </select>
                </div>
                <div>
                    <label>Stock / Lote que ingresa</label>
                    <input type="number" id="prod-stock" min="1" value="10">
                </div>
                <div>
                    <label>Precio de Venta (S/.)</label>
                    <input type="number" id="prod-price" step="0.10" min="0" value="5.00">
                </div>
            </div>

            <div class="modal-body" id="body-usuario" style="display: none;">
                <div>
                    <label>Nombre de Usuario</label>
                    <input type="text" id="new-user-name" placeholder="Ej. jperez">
                </div>
                <div>
                    <label>Contraseña del Usuario</label>
                    <input type="password" id="new-user-pass" placeholder="Mínimo 4 caracteres">
                </div>
                <div>
                    <label>Rol asignado</label>
                    <select id="new-user-role">
                        <option value="worker">Trabajador (Solo Ventas)</option>
                        <option value="admin">Administrador / Gerente</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <button style="padding:8px 15px; border:none; background:#bdc3c7; border-radius:4px; cursor:pointer;" onclick="closeModal()">Cancelar</button>
                <button style="padding:8px 15px; border:none; background:var(--primary); color:white; border-radius:4px; cursor:pointer;" onclick="saveAdminAction()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
